<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FasciatoioMap</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
  <link rel="apple-touch-icon" href="assets/logo-48.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <button id="btn-toggle-sidebar" class="btn-toggle-sidebar">☰</button>

  <div id="sidebar">
    <div class="logo-header">
      <img src="assets/logo-48.png" alt="FasciatoioMap" class="logo" />
      <div>
        <h1>FasciatoioMap</h1>
        <p class="subtitle">Trova un fasciatoio vicino a te</p>
      </div>
    </div>

    <div class="sidebar-scroll">

    <button id="btn-aggiungi" class="btn-primary">+ Segnala un posto</button>

    <div id="form-aggiungi" class="nascosto">
      <h2>Nuovo locale</h2>

      <label>Nome locale *
        <input type="text" id="input-nome" placeholder="Es. Bar Centrale" />
      </label>

      <label>Indirizzo *
        <input type="text" id="input-indirizzo" placeholder="Inizia a scrivere..." />
      </label>

      <label>Tipologia *
        <select id="input-tipo">
          <option value="">— scegli —</option>
          <option>Bar</option>
          <option>Ristorante</option>
          <option>Negozio</option>
          <option>Centro commerciale</option>
          <option>Altro</option>
        </select>
      </label>

      <fieldset class="fieldset-livello">
        <legend>Livello di pulizia *</legend>
        <label class="radio-livello eccellente">
          <input type="radio" name="livello" value="Eccellente" /> 🟢 Eccellente
        </label>
        <label class="radio-livello buono">
          <input type="radio" name="livello" value="Buono" /> 🟡 Buono
        </label>
        <label class="radio-livello sufficiente">
          <input type="radio" name="livello" value="Sufficiente" /> 🟠 Sufficiente
        </label>
        <label class="radio-livello scarso">
          <input type="radio" name="livello" value="Scarso" /> 🔴 Scarso
        </label>
      </fieldset>

      <fieldset class="fieldset-dotazioni">
        <legend>Dotazioni disponibili *</legend>
        <label class="checkbox"><input type="checkbox" name="dotazione" value="Fasciatoio" /> Fasciatoio</label>
        <label class="checkbox"><input type="checkbox" name="dotazione" value="Lavandino" /> Lavandino</label>
        <label class="checkbox"><input type="checkbox" name="dotazione" value="Salviette" /> Salviette</label>
        <label class="checkbox"><input type="checkbox" name="dotazione" value="Scaldabiberon" /> Scaldabiberon</label>
        <label class="checkbox"><input type="checkbox" name="dotazione" value="Pannolini" /> Pannolini</label>
        <label class="checkbox"><input type="checkbox" name="dotazione" value="Poltrona allattamento" /> Poltrona allattamento</label>
      </fieldset>

      <label>Note
        <textarea id="input-note" placeholder="Es. Fasciatoio nel bagno donne, al piano -1..."></textarea>
      </label>

      <label>Il tuo nickname
        <input type="text" id="input-nickname" placeholder="Es. Marco" />
      </label>

      <div class="form-buttons">
        <button id="btn-salva" class="btn-primary">Salva</button>
        <button id="btn-annulla" class="btn-secondary">Annulla</button>
      </div>

      <p id="form-errore" class="errore nascosto"></p>
    </div>

    <div id="filtri">
      <div class="filtri-header">
        <span class="filtri-label">Filtra</span>
        <button id="btn-reset-filtri" class="btn-reset-filtri nascosto">✕ Azzera</button>
      </div>
      <div class="filtri-row">
        <button class="chip-filtro chip-livello attivo" data-key="livello" data-valore="">Tutti</button>
        <button class="chip-filtro chip-livello" data-key="livello" data-valore="Eccellente" data-colore="#43A047">🟢 Eccellente</button>
        <button class="chip-filtro chip-livello" data-key="livello" data-valore="Buono" data-colore="#FFB300">🟡 Buono</button>
        <button class="chip-filtro chip-livello" data-key="livello" data-valore="Sufficiente" data-colore="#FB8C00">🟠 Sufficiente</button>
        <button class="chip-filtro chip-livello" data-key="livello" data-valore="Scarso" data-colore="#E53935">🔴 Scarso</button>
      </div>
      <div class="filtri-row">
        <button class="chip-filtro attivo" data-key="tipo" data-valore="">Tutto</button>
        <button class="chip-filtro" data-key="tipo" data-valore="Bar">☕ Bar</button>
        <button class="chip-filtro" data-key="tipo" data-valore="Ristorante">🍽 Rist.</button>
        <button class="chip-filtro" data-key="tipo" data-valore="Negozio">🛍 Negozio</button>
        <button class="chip-filtro" data-key="tipo" data-valore="Centro commerciale">🏬 C.C.</button>
        <button class="chip-filtro" data-key="tipo" data-valore="Altro">📍 Altro</button>
      </div>
      <div class="filtri-row">
        <button class="chip-filtro attivo" data-key="dotazione" data-valore="">Extra</button>
        <button class="chip-filtro" data-key="dotazione" data-valore="Scaldabiberon">🍼 Scaldabiberon</button>
        <button class="chip-filtro" data-key="dotazione" data-valore="Poltrona allattamento">🤱 Allattamento</button>
        <button class="chip-filtro" data-key="dotazione" data-valore="Pannolini">🩲 Pannolini</button>
        <button class="chip-filtro" data-key="dotazione" data-valore="Salviette">🧻 Salviette</button>
      </div>
    </div>

    <div id="lista-locali"></div>

    </div><!-- /sidebar-scroll -->
  </div>

  <div id="map"></div>

  <!-- Google Maps bootstrap -->
  <script>
    (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.googleapis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(a)}));d[l]?console.warn(p+" only loads once. Ignoring:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({
      key: "AIzaSyDnGAfKWfV2o7Csm0mDHs3Fgodf5IC6XXA",
      v: "weekly",
    });
  </script>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- I nostri script -->
  <script src="supabase.js"></script>
  <script src="app.js"></script>
  <script src="maps.js"></script>

</body>
</html>
